name: test 123

on:
  workflow_dispatch: 
  schedule:
    # প্রতি ৩ ঘণ্টা পর পর অটোমেটিক রান হবে (বাংলাদেশ সময় অনুযায়ী)
    - cron: '0 0 * * *'
    - cron: '0 3 * * *'
    - cron: '0 6 * * *'
    - cron: '0 9 * * *'
    - cron: '0 12 * * *'
    - cron: '0 15 * * *'
    - cron: '0 18 * * *'
    - cron: '0 21 * * *'

jobs:
  stream:
    runs-on: ubuntu-latest
    permissions:
      actions: write  # পুরনো রান ডিলিট করার জন্য এটি আবশ্যক
      contents: read
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # গিটহাবের নিজস্ব API ব্যবহার করে পুরনো রান ডিলিট করা (১০০% কাজ করবে)
      - name: Auto-Clean Old Workflow Runs
        run: |
          runs=$(gh api -X GET /repos/${{ github.repository }}/actions/runs --jq '.workflow_runs[] | select(.status == "completed") | .id')
          for run_id in $runs; do
            gh api -X DELETE /repos/${{ github.repository }}/actions/runs/$run_id || true
          done
        env:
          GITHUB_TOKEN: ${{ github.token }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install FFmpeg & Fonts
        run: |
          sudo apt-get update || true
          sudo apt-get install -y ffmpeg fonts-dejavu-core --fix-missing

      - name: Pick Assets
        id: pick
        run: |
          ASSETS=$(python script.py)
          echo "assets_path=$ASSETS" >> $GITHUB_OUTPUT

      - name: Start Continuous Stream
        run: |
          IFS='|' read -r MUSIC IMAGE T1 T2 T3 T4 T5 <<< "${{ steps.pick.outputs.assets_path }}"
          
          # -t 10980 (৩ ঘণ্টা ৩ মিনিট) দেওয়া হয়েছে যাতে বিরতিহীন থাকে
          ffmpeg -re -loop 1 -i "$IMAGE" \
          -stream_loop -1 -i "$MUSIC" \
          -t 10980 \
          -vf "zoompan=z='if(lte(mod(it,300),150),zoom+0.0005,zoom-0.0005)':d=1:x='iw/2-(iw/zoom)/2':y='ih/2-(ih/zoom)/2':s=1280x720, \
          drawtext=fontfile='/usr/share/fonts/truetype/dejavu/DejaVuSans-Bold.ttf':text='$T1':enable='lt(mod(t,1500),300)':fontcolor=white@0.8:fontsize=32:x='w-(mod(t*50,w+600))':y='h-50':box=1:boxcolor=black@0.4:boxborderw=10, \
          drawtext=fontfile='/usr/share/fonts/truetype/dejavu/DejaVuSans-Bold.ttf':text='$T2':enable='between(mod(t,1500),300,600)':fontcolor=white@0.8:fontsize=32:x='w-(mod(t*50,w+600))':y='h-50':box=1:boxcolor=black@0.4:boxborderw=10, \
          drawtext=fontfile='/usr/share/fonts/truetype/dejavu/DejaVuSans-Bold.ttf':text='$T3':enable='between(mod(t,1500),600,900)':fontcolor=white@0.8:fontsize=32:x='w-(mod(t*50,w+600))':y='h-50':box=1:boxcolor=black@0.4:boxborderw=10, \
          drawtext=fontfile='/usr/share/fonts/truetype/dejavu/DejaVuSans-Bold.ttf':text='$T4':enable='between(mod(t,1500),900,1200)':fontcolor=white@0.8:fontsize=32:x='w-(mod(t*50,w+600))':y='h-50':box=1:boxcolor=black@0.4:boxborderw=10, \
          drawtext=fontfile='/usr/share/fonts/truetype/dejavu/DejaVuSans-Bold.ttf':text='$T5':enable='between(mod(t,1500),1200,1500)':fontcolor=white@0.8:fontsize=32:x='w-(mod(t*50,w+600))':y='h-50':box=1:boxcolor=black@0.4:boxborderw=10" \
          -c:v libx264 -preset ultrafast -b:v 1800k -maxrate 2000k -bufsize 4000k \
          -pix_fmt yuv420p -g 60 -c:a aac -b:a 128k -ar 44100 \
          -f flv "rtmp://a.rtmp.youtube.com/live2/${{ secrets.YOUTUBE_STREAM_KEY }}?bandwidthtest=false"
